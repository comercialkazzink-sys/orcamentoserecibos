<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orçamentos e Recibos</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app" class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-content">
        <h1>📄 Orçamentos e Recibos</h1>
        <nav class="navbar">
          <a href="#dashboard" id="navDashboard">Dashboard</a>
          <a href="#orcamentos" id="navOrcamentos">Orçamentos</a>
          <a href="#recibos" id="navRecibos">Recibos</a>
          <a href="#perfil" id="navPerfil">Perfil</a>
          <button id="btnLogout">Sair</button>
        </nav>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      
      <!-- Tela de Login -->
      <section id="loginSection" class="section active">
        <div class="login-container">
          <h2>Bem-vindo!</h2>
          <form id="loginForm">
            <div class="form-group">
              <label>Email:</label>
              <input type="email" id="loginEmail" required>
            </div>
            <div class="form-group">
              <label>Senha:</label>
              <input type="password" id="loginSenha" required>
            </div>
            <button type="submit" class="btn-primary">Entrar</button>
            <p>Não tem conta? <a href="#" id="toggleRegistro">Criar uma</a></p>
          </form>
        </div>
        
        <div id="registroContainer" class="login-container" style="display: none;">
          <h2>Criar Conta</h2>
          <form id="registroForm">
            <div class="form-group">
              <label>Nome:</label>
              <input type="text" id="registroNome" required>
            </div>
            <div class="form-group">
              <label>Email:</label>
              <input type="email" id="registroEmail" required>
            </div>
            <div class="form-group">
              <label>Empresa (opcional):</label>
              <input type="text" id="registroEmpresa">
            </div>
            <div class="form-group">
              <label>Senha:</label>
              <input type="password" id="registroSenha" required>
            </div>
            <button type="submit" class="btn-primary">Registrar</button>
            <p>Já tem conta? <a href="#" id="toggleLogin">Entrar</a></p>
          </form>
        </div>
      </section>

      <!-- Dashboard -->
      <section id="dashboard" class="section">
        <div class="dashboard-content">
          <h2>Dashboard</h2>
          <div class="stats-grid">
            <div class="stat-card">
              <h3>Orçamentos</h3>
              <p class="stat-number" id="totalOrcamentos">0</p>
              <p class="stat-limit" id="limitOrcamentos">0/10</p>
            </div>
            <div class="stat-card">
              <h3>Recibos</h3>
              <p class="stat-number" id="totalRecibos">0</p>
              <p class="stat-limit" id="limitRecibos">0/10</p>
            </div>
            <div class="stat-card">
              <h3>Plano</h3>
              <p class="stat-plan" id="userPlan">FREE</p>
            </div>
          </div>
        </div>
      </section>

      <!-- Orçamentos -->
      <section id="orcamentos" class="section">
        <div class="orcamentos-content">
          <div class="section-header">
            <h2>Orçamentos</h2>
            <button class="btn-primary" id="btnNovoOrcamento">+ Novo Orçamento</button>
          </div>
          <div id="orcamentosList" class="list-container">
            <!-- Orçamentos serão listados aqui -->
          </div>
        </div>
      </section>

      <!-- Recibos -->
      <section id="recibos" class="section">
        <div class="recibos-content">
          <div class="section-header">
            <h2>Recibos</h2>
            <button class="btn-primary" id="btnNovoRecibo">+ Novo Recibo</button>
          </div>
          <div id="recibosList" class="list-container">
            <!-- Recibos serão listados aqui -->
          </div>
        </div>
      </section>

      <!-- Perfil -->
      <section id="perfil" class="section">
        <div class="perfil-content">
          <h2>Meu Perfil</h2>
          <div class="perfil-info">
            <p><strong>Nome:</strong> <span id="perfilNome"></span></p>
            <p><strong>Email:</strong> <span id="perfilEmail"></span></p>
            <p><strong>Plano:</strong> <span id="perfilPlano"></span></p>
          </div>
        </div>
      </section>

    </main>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
